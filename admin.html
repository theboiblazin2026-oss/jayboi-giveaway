<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giveaway Admin Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Canvas Confetti for picking winner -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-bg: #0f0c29;
            --secondary-bg: #302b63;
            --gold: #FFD700;
            --magenta: #ff007f;
            --text-light: #ffffff;
            --text-dim: #cccccc;
            --card-bg: rgba(255, 255, 255, 0.05);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-bg);
            color: var(--text-light);
            padding: 20px;
        }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
        h1 { color: var(--gold); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--magenta); }
        .stat-card h3 { font-size: 0.9rem; color: var(--text-dim); }
        .stat-card p { font-size: 2rem; font-weight: 900; margin-top: 0.5rem; }
        
        table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { background: rgba(0,0,0,0.3); color: var(--gold); font-size: 0.9rem; text-transform: uppercase; }
        tr:hover { background: rgba(255,255,255,0.1); }
        .badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; }
        
        .actions { display: flex; gap: 10px; margin-bottom: 2rem; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--gold); color: #000; }
        .btn-primary:hover { background: #e6c200; transform: translateY(-2px); }
        .btn-danger { background: var(--magenta); color: #fff; }
        .btn-danger:hover { background: #d6006a; transform: translateY(-2px); }

        /* Winner Modal */
        #winner-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .winner-content { background: linear-gradient(135deg, var(--secondary-bg), var(--primary-bg)); padding: 3rem; border-radius: 16px; text-align: center; border: 2px solid var(--gold); box-shadow: 0 0 40px rgba(255,215,0,0.3); max-width: 500px; width: 90%; }
        .winner-content h2 { font-size: 2.5rem; color: var(--gold); margin-bottom: 1rem; }
        .winner-ticket { font-size: 3rem; font-weight: 900; margin: 1.5rem 0; letter-spacing: 2px; }
        .hidden { display: none !important; }

        /* Login Screen */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--primary-bg); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .login-box { background: var(--card-bg); padding: 2rem; border-radius: 8px; text-align: center; }
        .login-box input { padding: 10px; margin: 10px 0; width: 100%; border-radius: 4px; border: none; }
    </style>
</head>
<body>

    <!-- Simple Password Gate -->
    <div id="login-screen">
        <div class="login-box">
            <h2>Admin Login</h2>
            <input type="password" id="admin-password" placeholder="Enter PIN">
            <button class="btn-primary" id="login-btn">Login</button>
        </div>
    </div>

    <div id="dashboard" class="hidden">
        <header>
            <h1>Giveaway Dashboard</h1>
            <div class="actions">
                <button class="btn-primary" id="export-csv">Export CSV</button>
                <button class="btn-danger" id="pick-winner">PICK RANDOM WINNER</button>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Entries</h3>
                <p id="total-entries">0</p>
            </div>
            <div class="stat-card">
                <h3>Business Leads</h3>
                <p id="business-entries">0</p>
            </div>
            <div class="stat-card">
                <h3>Conversion Rate</h3>
                <p id="conversion-rate">--%</p>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Ticket #</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Type</th>
                        <th>Business/Interest</th>
                    </tr>
                </thead>
                <tbody id="entries-table-body">
                    <!-- Data populates here -->
                    <tr><td colspan="7" style="text-align: center;">Loading entries...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Winner Modal -->
    <div id="winner-modal" class="hidden">
        <div class="winner-content">
            <h2>🎉 WE HAVE A WINNER 🎉</h2>
            <p>The randomly selected ticket is:</p>
            <div class="winner-ticket" id="winner-ticket-display">--</div>
            <p id="winner-details" style="color: var(--text-dim); margin-bottom: 2rem;"></p>
            <button class="btn-primary" onclick="document.getElementById('winner-modal').classList.add('hidden')">Close</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
